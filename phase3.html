<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Dominos - OKR Farming Intro</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: "Courier New", monospace;
        }
        #introVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        #overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 12px;
            color: #0ff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.65));
            pointer-events: none;
        }
        #skipBtn {
            pointer-events: auto;
            border: 1px solid #0ff;
            background: rgba(0, 0, 0, 0.7);
            color: #0ff;
            padding: 10px 18px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <video id="introVideo" autoplay muted playsinline preload="auto">
        <source src="./phase3-intro.mp4" type="video/mp4">
    </video>
    <div id="overlay">
        <h1>OKR FARMING</h1>
        <p>Loading automation grid...</p>
        <button id="skipBtn" onclick="enterGame()">SKIP INTRO</button>
    </div>
    <script>
        const target = './index.html';
        let redirected = false;
        function enterGame() {
            if (redirected) return;
            redirected = true;
            window.location.href = target;
        }
        const video = document.getElementById('introVideo');
        video.addEventListener('ended', enterGame);
        video.addEventListener('error', enterGame);
        setTimeout(enterGame, 12000);
    </script>
</body>
</html>
